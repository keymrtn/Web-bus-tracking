<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun — BusGo</title>
  <link class="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg);">

  <div class="card" style="width: 100%; max-width: 400px; margin: 1rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Buat Akun Baru</h2>

    <form id="register-form">
      <div id="error-alert" style="display:none; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;"></div>
      
      <div class="form-group">
        <label class="form-label" for="name">Nama Lengkap</label>
        <input class="form-control" type="text" id="name" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;">Daftar</button>
      
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Sudah punya akun? <a href="login.html" style="color: var(--primary);">Login di sini</a>
      </div>
    </form>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorAlert = document.getElementById("error-alert");
        errorAlert.style.display = "none";

        const name = document.getElementById("name").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const res = await api.register(username, password, name);
          if (res.success) {
            alert("Registrasi berhasil! Silakan login.");
            window.location.href = "login.html";
          }
        } catch (err) {
          errorAlert.textContent = err.message;
          errorAlert.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
