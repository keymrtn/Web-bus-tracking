<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BusGo</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg);">

  <div class="card" style="width: 100%; max-width: 400px; margin: 1rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <i class="bi bi-bus-front-fill" style="font-size: 3rem; color: var(--primary);"></i>
      <h2>Login ke BusGo</h2>
    </div>

    <form id="login-form">
      <div id="error-alert" style="display:none; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;"></div>
      
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" required placeholder="admin atau ricky">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" required placeholder="adminpassword">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk</button>
      
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Belum punya akun? <a href="register.html" style="color: var(--primary);">Daftar di sini</a>
      </div>
    </form>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Auto redirect if already logged in
      const user = storage.getCurrentUser();
      if (user) {
        window.location.href = user.role === "admin" ? "admin.html" : "index.html";
      }

      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const res = storage.login(
          document.getElementById("username").value,
          document.getElementById("password").value
        );
        
        if (res.success) {
          window.location.href = res.user.role === "admin" ? "admin.html" : "index.html";
        } else {
          const err = document.getElementById("error-alert");
          err.style.display = "block";
          err.textContent = res.message;
        }
      });
    });
  </script>
</body>
</html>
