<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — BusGo</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary: #8b5cf6; /* Warna ungu premium untuk Admin Portal */
    }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a;">

  <div class="card" style="width: 100%; max-width: 400px; margin: 1rem; border: 1px solid rgba(139, 92, 246, 0.2); box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
      <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--primary);"></i>
      <h2 style="margin-top: 10px;">BusGo Admin Portal</h2>
      <p style="color: var(--text-muted); font-size: 0.85rem;">Gunakan kredensial Administrator untuk mengakses dashboard</p>
    </div>

    <form id="login-admin-form">
      <div id="error-alert" style="display:none; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;"></div>
      
      <div class="form-group">
        <label class="form-label" for="username">Username Admin</label>
        <input class="form-control" type="text" id="username" required placeholder="Contoh: admin" style="border-color: rgba(255,255,255,0.1);">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" required placeholder="••••••••" style="border-color: rgba(255,255,255,0.1);">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; background: var(--primary);">Masuk ke Dashboard</button>
      
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
        <a href="login.html" style="color: var(--text-muted); text-decoration: none;"><i class="bi bi-arrow-left"></i> Kembali ke Portal Penumpang</a>
      </div>
    </form>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Auto redirect if already logged in as admin
      const user = storage.getCurrentUser();
      if (user && user.role === "admin") {
        window.location.href = "admin.html";
      }

      document.getElementById("login-admin-form").addEventListener("submit", (e) => {
        e.preventDefault();
        
        const usernameVal = document.getElementById("username").value;
        const passwordVal = document.getElementById("password").value;
        
        const res = storage.login(usernameVal, passwordVal);
        
        if (res.success) {
          if (res.user.role === "admin") {
            window.location.href = "admin.html";
          } else {
            // Logout user if not admin
            storage.logout();
            const err = document.getElementById("error-alert");
            err.style.display = "block";
            err.textContent = "Akses ditolak! Akun Anda tidak memiliki hak akses Administrator.";
          }
        } else {
          const err = document.getElementById("error-alert");
          err.style.display = "block";
          err.textContent = res.message;
        }
      });
    });
  </script>
</body>
</html>
