<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusGo — Cari Jadwal Bus & Tracking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  
  <header class="app-header">
    <div class="app-brand">
      <i class="bi bi-bus-front-fill"></i> BusGo
    </div>
    <div class="header-profile" id="user-header"></div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Cari Jadwal Bus</h2>
      <form id="search-form">
        <div class="form-group">
          <label class="form-label" for="select-route">Pilih Rute Perjalanan</label>
          <select class="form-control" id="select-route" required>
            <option value="">-- Pilih Rute --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="select-date">Pilih Tanggal</label>
          <input class="form-control" type="date" id="select-date" required>
        </div>
        
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-search"></i> Cari Jadwal
        </button>
      </form>
    </section>

    <section id="results-section" style="display: none;">
      <h3 id="results-title">Jadwal Tersedia</h3>
      <div id="schedule-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <i class="bi bi-search"></i>
      <span>Cari</span>
    </a>
    <a href="my-tickets.html" class="nav-item">
      <i class="bi bi-ticket-perforated"></i>
      <span>Tiket Saya</span>
    </a>
  </nav>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (!api.isLoggedIn()) {
        window.location.href = "login.html";
        return;
      }

      const currentUser = api.getCurrentUser();
      const headerDiv = document.getElementById("user-header");
      headerDiv.innerHTML = `
        <span style="font-size:0.9rem; margin-right: 10px;">Halo, <b>${currentUser.name}</b></span>
        <button id="btn-logout" class="btn" style="padding: 4px 8px; font-size: 0.8rem; width: auto; background: rgba(255,255,255,0.1); border: 1px solid var(--border);">Logout</button>
      `;

      document.getElementById("btn-logout").addEventListener("click", () => {
        api.logout();
        window.location.href = "login.html";
      });

      // Sync data from API to localStorage cache
      await syncFromAPI();

      const routeSelect = document.getElementById("select-route");
      const dateInput = document.getElementById("select-date");
      
      // Default date to today
      const today = new Date().toISOString().split('T')[0];
      dateInput.value = today;

      // Load routes from LOCAL data (matches admin's routes)
      getRoutes().forEach(route => {
        const option = document.createElement("option");
        option.value = route.id;
        option.textContent = `${route.nama}`;
        routeSelect.appendChild(option);
      });
      
      // Search schedules
      document.getElementById("search-form").addEventListener("submit", function(e) {
        e.preventDefault();
        const routeId = routeSelect.value;
        const selectedDate = dateInput.value;
        const resultsSection = document.getElementById("results-section");
        const listDiv = document.getElementById("schedule-list");
        
        listDiv.innerHTML = "";
        resultsSection.style.display = "block";
        
        // Load schedules from API + custom (not auto-generated)
        let allSchedules = [];
        const syncedSchedules = typeof getSyncedSchedules === 'function' ? getSyncedSchedules() : [];
        const customSchedules = storage.getCustomSchedules();
        // Merge: API first then custom (override dupes)
        allSchedules = [...(syncedSchedules || [])];
        customSchedules.forEach(cs => {
          const idx = allSchedules.findIndex(s => s.id === cs.id);
          if (idx >= 0) allSchedules[idx] = cs;
          else allSchedules.push(cs);
        });
        // Filter by date
        const formatDate = (d) => d.split('T')[0] || d;
        allSchedules = allSchedules.filter(s => formatDate(s.tanggal) === selectedDate);
        // Then filter by route
        const schedules = allSchedules.filter(s => String(s.routeId) === routeId);
        
        if (schedules.length === 0) {
          listDiv.innerHTML = `
            <div style="text-align: center; color: var(--text-muted); padding: 2rem;">
              <i class="bi bi-calendar-x" style="font-size: 2.5rem; display: block; margin-bottom: 0.5rem;"></i>
              Tidak ada jadwal pada rute dan tanggal ini.
            </div>
          `;
          return;
        }
        
        schedules.forEach(schedule => {
          const available = storage.getAvailableSeats(schedule.id);
          const isSoldOut = available === 0;

          const item = document.createElement("div");
          item.className = "schedule-item";
          item.innerHTML = `
            <div class="schedule-details">
              <div>
                <strong>${schedule.busNomor}</strong>
                <span class="bus-type">${schedule.busTipe}</span>
              </div>
              <div style="margin-top: 5px; font-size: 0.9rem; color: var(--text-muted);">
                <i class="bi bi-clock"></i> ${schedule.jamBerangkat} WIB ➔ ${schedule.jamSampai} WIB
              </div>
              <div style="margin-top: 5px; font-weight: 600; color: var(--primary);">
                Rp ${Number(schedule.harga).toLocaleString("id-ID")}
                <span style="font-size: 0.8rem; margin-left: 10px; color: ${isSoldOut ? '#ef4444' : 'var(--success)'};">Sisa Kursi: ${available}</span>
              </div>
            </div>
            <div>
              ${isSoldOut ? 
                `<button class="btn btn-secondary" disabled style="padding: 6px 12px; font-size: 0.85rem; cursor: not-allowed; opacity: 0.7;">Penuh</button>` : 
                `<a href="booking.html?scheduleId=${schedule.id}" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem;">Pesan</a>`
              }
            </div>
          `;
          listDiv.appendChild(item);
        });
      });
    });
  </script>
</body>
</html>
