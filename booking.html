<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Tiket — BusGo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .payment-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .payment-option {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .payment-option:hover {
      border-color: var(--primary);
      background: rgba(249, 115, 22, 0.05);
    }
    .payment-option.active {
      border-color: var(--primary);
      background: rgba(249, 115, 22, 0.1);
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
    }
    .payment-option i {
      font-size: 1.5rem;
      color: var(--primary);
    }
    .payment-option-title {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .payment-option-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-brand">
      <i class="bi bi-bus-front-fill"></i> BusGo
    </div>
  </header>

  <main class="container">
    <div style="margin-bottom: 1rem;">
      <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">
        <i class="bi bi-chevron-left"></i> Kembali ke Pencarian
      </a>
    </div>

    <!-- Detail Perjalanan Card -->
    <section class="card" id="detail-bus-card">
      <h3 style="color: var(--primary); display: flex; justify-content: space-between; align-items: center;">
        <span>Detail Keberangkatan</span>
        <span id="seat-availability-badge" class="badge">Sisa Kursi: --</span>
      </h3>
      <div id="sch-details">Memuat detail keberangkatan...</div>
    </section>

    <!-- Form Pemesanan -->
    <section class="card" style="margin-top: 1.5rem;">
      <h3>Formulir Pemesanan</h3>
      <form id="booking-form">
        <div class="form-group">
          <label class="form-label" for="nama">Nama Penumpang</label>
          <input class="form-control" type="text" id="nama" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="hp">Nomor HP / WhatsApp</label>
          <input class="form-control" type="tel" id="hp" required placeholder="Contoh: 08123456789">
        </div>

        <div class="form-group">
          <label class="form-label" for="kursi">Jumlah Kursi</label>
          <select class="form-control" id="kursi">
            <option value="1">1 Kursi</option>
            <option value="2">2 Kursi</option>
            <option value="3">3 Kursi</option>
            <option value="4">4 Kursi</option>
          </select>
        </div>

        <!-- Visual Seat Selector Container -->
        <div id="visual-seat-picker-container" style="margin-bottom: 1.5rem;"></div>

        <!-- Metode Pembayaran -->
        <div class="form-group">
          <label class="form-label">Metode Pembayaran</label>
          <input type="hidden" id="payment-method-input" value="transfer" required>
          <div class="payment-options">
            <div class="payment-option active" data-method="transfer">
              <i class="bi bi-bank"></i>
              <div>
                <div class="payment-option-title">Transfer Bank</div>
                <div class="payment-option-desc">Manual verification</div>
              </div>
            </div>
            <div class="payment-option" data-method="e-wallet">
              <i class="bi bi-wallet2"></i>
              <div>
                <div class="payment-option-title">QRIS / E-Wallet</div>
                <div class="payment-option-desc">Instant confirmation</div>
              </div>
            </div>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem;">
          <div>
            <span style="color: var(--text-muted); font-size: 0.9rem; display: block;">Total Pembayaran</span>
            <strong id="total-pembayaran" style="font-size: 1.5rem; color: var(--primary);">Rp 0</strong>
          </div>
          <button type="submit" class="btn btn-primary" style="width: auto; padding: 12px 24px;">Pesan Sekarang</button>
        </div>
      </form>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/seat-selector.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (!api.isLoggedIn()) {
        window.location.href = "login.html";
        return;
      }

      // Sync data from API to localStorage cache
      await syncFromAPI();

      const params = new URLSearchParams(window.location.search);
      const scheduleId = params.get("scheduleId");
      if (!scheduleId) {
        window.location.href = "index.html";
        return;
      }

      // Prefill user data
      const user = api.getCurrentUser();
      document.getElementById("nama").value = user.name || "";

      let sch = null;
      let numericSchedId = null;
      window.apiBookedSeats = [];

      async function loadScheduleData() {
        try {
          // Determine numeric schedule_id from synced API data first
          if (typeof scheduleId === 'string' && !/^\d+$/.test(scheduleId)) {
            // Local-generated string ID (SCH-R1-...), find matching API schedule
            const synced = getSyncedSchedules();
            const sidNum = parseInt(scheduleId.replace(/\D/g, ''), 10);
            // Try to find by numeric part match
            const match = synced.find(s => s.id == sidNum || s.id == scheduleId.replace(/^SCH-/, ''));
            if (match) numericSchedId = match.id;
          } else {
            numericSchedId = parseInt(scheduleId, 10);
          }

          // Try local schedules first (API-synced + custom)
          const syncedSchedules = typeof getSyncedSchedules === 'function' ? getSyncedSchedules() : [];
          const customSchedules = storage.getCustomSchedules();
          // Merge: API first then custom (override dupes)
          let allLocal = [...(syncedSchedules || [])];
          customSchedules.forEach(cs => {
            const idx = allLocal.findIndex(s => s.id === cs.id);
            if (idx >= 0) allLocal[idx] = cs;
            else allLocal.push(cs);
          });
          
          
          sch = allLocal.find(s => s.id == scheduleId);
          
          if (!sch) {
            // Fallback: try from API
            const schedules = await api.getSchedules();
            sch = schedules.find(s => s.id == scheduleId);
          }
          if (!sch) {
            alert("Jadwal tidak ditemukan.");
            window.location.href = "index.html";
            return;
          }

          // Fetch booked seats from storage (cross-session persistent)
          try {
            const seats = await api.getBookedSeats(numericSchedId || scheduleId);
            window.apiBookedSeats = seats.map(s => s.seat_number.toString());
          } catch(e) {
            // Fallback to storage tickets
            const tickets = storage.getTickets().filter(t => t.scheduleId === scheduleId && t.statusTiket !== 'dibatalkan');
            window.apiBookedSeats = tickets.reduce((arr, t) => arr.concat(t.selectedSeats || []), []);
          }

          // Normalize sch to support both API format and local data.js format
          const sOrigin = sch.origin_name || sch.ruteAwal || '';
          const sDest = sch.dest_name || sch.ruteAkhir || '';
          const sBusNo = sch.bus_nomor || sch.busNomor || '';
          const sBusType = sch.bus_tipe || sch.busTipe || '';
          const sTanggal = sch.tanggal || '';
          const sTimeStart = sch.time_start || sch.jamBerangkat || '';
          const sTimeEnd = sch.time_end || sch.jamSampai || '';
          const sKapasitas = sch.kapasitas || 30;
          const sPrice = sch.price || sch.harga || 0;

          // Render details
          document.getElementById("sch-details").innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
              <div>
                <strong style="font-size: 1.2rem; display: block;">${sOrigin} ➔ ${sDest}</strong>
                <span style="font-size: 0.85rem; color: var(--text-muted);">${sch.jarak || ''}</span>
              </div>
              <span class="badge badge-warning">${sBusNo}</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.95rem; border-top: 1px solid var(--border); padding-top: 0.75rem;">
              <div>
                <span style="color: var(--text-muted); display: block;">Tanggal</span>
                <strong>${sTanggal}</strong>
              </div>
              <div>
                <span style="color: var(--text-muted); display: block;">Waktu</span>
                <strong>${sTimeStart} - ${sTimeEnd} WIB</strong>
              </div>
              <div>
                <span style="color: var(--text-muted); display: block;">Tipe Bus</span>
                <strong>${sBusType}</strong>
              </div>
            </div>
          `;

          // Override sch with normalized values for later use
          sch.kapasitas = sKapasitas;
          sch.price = sPrice;

          updateSeatsBadge();
          updateTotal();
          renderSeatPicker();

        } catch (err) {
          alert("Gagal memuat detail keberangkatan: " + err.message);
        }
      }

      function updateSeatsBadge() {
        const available = Math.max(0, sch.kapasitas - window.apiBookedSeats.length);
        const badgeEl = document.getElementById("seat-availability-badge");
        badgeEl.textContent = `Sisa Kursi: ${available}`;
        if (available === 0) {
          badgeEl.style.backgroundColor = "#ef4444";
        } else if (available < 5) {
          badgeEl.style.backgroundColor = "var(--warning)";
        } else {
          badgeEl.style.backgroundColor = "var(--success)";
        }
      }

      const kursiSelect = document.getElementById("kursi");
      const totalText = document.getElementById("total-pembayaran");

      let selectedSeats = [];
      function renderSeatPicker() {
        const qty = parseInt(kursiSelect.value);
        BusSeatSelector.render(document.getElementById("visual-seat-picker-container"), {
          busTipe: sch.bus_tipe,
          scheduleId: sch.id,
          maxSeats: qty,
          onChange: (seats) => {
            selectedSeats = seats;
          }
        });
      }

      function updateTotal() {
        const qty = parseInt(kursiSelect.value);
        totalText.textContent = `Rp ${(sch.price * qty).toLocaleString("id-ID")}`;
      }

      kursiSelect.addEventListener("change", () => {
        selectedSeats = [];
        updateTotal();
        renderSeatPicker();
      });

      // Payment Option Selection
      const paymentOptions = document.querySelectorAll('.payment-option');
      paymentOptions.forEach(opt => {
        opt.addEventListener('click', () => {
          paymentOptions.forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
          document.getElementById('payment-method-input').value = opt.dataset.method;
        });
      });

      // Submit booking
      document.getElementById("booking-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const qty = parseInt(kursiSelect.value);

        if (selectedSeats.length !== qty) {
          alert(`Silakan pilih tepat ${qty} nomor kursi pada peta bus!`);
          return;
        }

        try {
          // Save to local storage FIRST (synchronous) so my-tickets works even if API fails
          const ticket = {
            id: `TKT-${Date.now()}`,
            username: api.getCurrentUser()?.username || 'guest',
            scheduleId: sch.id,
            namaPenumpang: document.getElementById("nama").value.trim(),
            noHP: document.getElementById("hp").value.trim(),
            rute: `${sch.ruteAwal || sch.origin_name || ''} - ${sch.ruteAkhir || sch.dest_name || ''}`,
            ruteAwal: sch.ruteAwal || sch.origin_name || '',
            ruteAkhir: sch.ruteAkhir || sch.dest_name || '',
            busNomor: sch.busNomor || sch.bus_nomor || '',
            tanggal: sch.tanggal,
            jamBerangkat: sch.jamBerangkat || sch.time_start,
            selectedSeats: selectedSeats,
            jumlahKursi: selectedSeats.length,
            statusTiket: "dibeli",
            createdAt: new Date().toISOString(),
            totalHarga: (sch.price || sch.harga || 0) * selectedSeats.length
          };
          storage.saveTicket(ticket);

          // Then try API (may fail silently)
          try {
            for (const seat of selectedSeats) {
              await api.bookTicket(numericSchedId || sch.id, seat);
            }
          } catch (apiErr) {
            console.warn('API booking failed, ticket saved locally:', apiErr.message);
          }

          alert("Tiket berhasil dipesan!");
          window.location.href = "my-tickets.html";
        } catch (err) {
          alert("Gagal memesan tiket: " + err.message);
        }
      });

      await loadScheduleData();
    });
  </script>
</body>
</html>
